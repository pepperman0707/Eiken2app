.app{

overflow:hidden;

padding:15px;

#example{

border:1px solid #ccc;
margin-top:10px;

padding:12px;

margin-top:10px;

border:none;

}

#result{
margin-top:10px;
font-size:18px;
}

#stats{
font-size:14px;
margin-top:5px;
}

.progress{

height:15px;
background:#eee;
border-radius:10px;

}

.bar{
height:15px;
background:#4caf50;
border-radius:10px;
width:0%;
}

.searchBox{
width:90%;
margin-top:10px;
}

.wordItem{
padding:5px;
border-bottom:1px solid #eee;
text-align:left;
}

.nav{
display:flex;
border-top:1px solid #ddd;
}

.nav button{
flex:1;
background:white;
color:black;
border:none;
padding:12px;
}

  {word:"violence",meaning:"暴力"},
  {word:"volunteer",meaning:"ボランティア"},
  {word:"vulnerable",meaning:"傷つきやすい"},

  // W
  {word:"welfare",meaning:"福祉"},
  {word:"widespread",meaning:"広く行きわたった"},
  {word:"willing",meaning:"〜する気がある"},
  {word:"wisdom",meaning:"知恵"},
  {word:"witness",meaning:"目撃する"},

  // A
];

let wrongWords=JSON.parse(localStorage.getItem("wrongWords")||"{}");

let current;
let correct=0;
let total=0;

function updateBar(){

let percent=(todayCount/dailyLimit)*100;

document.getElementById("bar").style.width=percent+"%";

}

function next(){

if(todayCount>=dailyLimit){

document.getElementById("meaning").innerText="今日の20問終了";
document.getElementById("example").innerText="";
return;

}

current=words[Math.floor(Math.random()*words.length)];

document.getElementById("meaning").innerText=current.meaning;

document.getElementById("answer").value="";
document.getElementById("result").innerText="";

todayCount++;

updateBar();

}

function check(){

let ans=document.getElementById("answer").value.trim().toLowerCase();

total++;

if(ans===current.word){

correct++;
document.getElementById("result").innerText="正解";

}else{

document.getElementById("result").innerText="不正解 正解:"+current.word;

wrongWords[current.word]=(wrongWords[current.word]||0)+1;

localStorage.setItem("wrongWords",JSON.stringify(wrongWords));

}

updateStats();

}

function updateStats(){

document.getElementById("stats").innerText=

"問題:"+total+
" 正解:"+correct+
" 正解率:"+Math.round((correct/Math.max(total,1))*100)+"%";

}

function speak(){

let uttr=new SpeechSynthesisUtterance(current.word);
uttr.lang="en-US";
speechSynthesis.speak(uttr);

}

function showRanking(){

let list=Object.entries(wrongWords)
.sort((a,b)=>b[1]-a[1])
.slice(0,10);

let text="苦手単語ランキング\n\n";

list.forEach((w,i)=>{

text+=(i+1)+"位 "+w[0]+" ("+w[1]+"回)\n";

});

alert(text);

}

function searchWord(){

let q=document.getElementById("search").value.toLowerCase();

let result=words.filter(w=>
w.word.includes(q) || w.meaning.includes(q)
);

let html="";

result.forEach(w=>{

html+="<div class='wordItem'>"+w.word+" : "+w.meaning+"</div>";

});

document.getElementById("searchResult").innerHTML=html;

}

window.onload = function(){
  next();
}
</script>
